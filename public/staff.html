<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Staff Multi-Lane Slider (Two-Way Sync)</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root { 
            --bg-color: #0f0f11; 
            --text-color: #ffffff; 
            --success: #16a34a; 
            --warning: #eab308; 
            --danger: #dc2626; 
            --primary: #2563eb; 
            --orange: #ea580c; 
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: system-ui, -apple-system, sans-serif; padding: 0; margin: 0; overflow-x: hidden; }
        h1 { font-size: 1.2rem; text-align: center; margin: 10px 0 5px 0; color: #58a6ff; }
        .slider-wrapper { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; width: 100vw; height: calc(100vh - 45px); box-sizing: border-box; padding-bottom: 10px; }
        .slider-wrapper::-webkit-scrollbar { display: none; }
        
        .slot-card { flex: 0 0 100vw; scroll-snap-align: start; box-sizing: border-box; padding: 15px 20px; display: flex; flex-direction: column; gap: 8px; height: 100%; overflow-y: auto; transition: border-color 0.3s; border: 4px solid transparent; }
        
        #slot-1 { background-color: #1e1e24; } 
        #slot-2 { background-color: #131c2e; } 
        #slot-3 { background-color: #0f241a; } 
        #slot-4 { background-color: #1f142c; } 
        #slot-5 { background-color: #2a1215; } 

        .slot-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.15); padding-bottom: 5px; font-weight: bold; font-size: 1rem; color: #cbd5e1; }
        .slot-indicator { background: rgba(0,0,0,0.4); padding: 3px 8px; border-radius: 12px; font-size: 0.8rem; border: 1px solid rgba(255,255,255,0.1); }
        select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); color: #fff; font-size: 1.1rem; border-radius: 8px; box-sizing: border-box; }
        
        .ticket-stepper { display: flex; align-items: center; gap: 8px; width: 100%; margin: 2px 0; }
        .btn-step { background: rgba(255,255,255,0.15); color: white; border: 1px solid rgba(255,255,255,0.1); width: 50px; height: 48px; font-size: 1.5rem; font-weight: bold; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .ticket-stepper input { flex: 1; text-align: center; height: 48px; font-size: 1.3rem; font-weight: bold; padding: 5px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.2); color: #fff; border-radius: 8px; }
        
        .queue-control-grid { display: grid; grid-template-columns: 1.5fr 1fr; gap: 6px; }
        .btn-action { width: 100%; padding: 12px; font-size: 1.1rem; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; }
        .btn-add-queue { background: var(--primary); color: white; }
        .btn-remove-queue { background: var(--orange); color: white; }
        .btn-start { background: var(--success); color: white; padding: 14px; font-size: 1.3rem; }
        .btn-pause { background: var(--warning); color: #000; padding: 14px; font-size: 1.3rem; }
        .btn-reset { background: rgba(0,0,0,0.3); color: #ff6b6b; font-size: 0.85rem; padding: 8px; border: 1px solid #ff6b6b; margin-top: auto; cursor: pointer; border-radius: 6px; }
        
        .timer-box { font-size: 3rem; font-family: monospace; font-weight: bold; text-align: center; margin: 2px 0; color: #58a6ff; background: rgba(0,0,0,0.4); padding: 5px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
        .queue-info { font-size: 0.9rem; text-align: center; color: #cbd5e1; background: rgba(0,0,0,0.3); padding: 8px; border-radius: 6px; }
        
        .tray-title { font-size: 0.85rem; font-weight: bold; color: #58a6ff; margin-top: 2px; }
        .queue-tray { display: flex; gap: 6px; overflow-x: auto; padding: 6px 4px; min-height: 38px; background: rgba(0,0,0,0.4); border-radius: 6px; border: 1px solid rgba(255,255,255,0.1); }
        .ticket-chunk { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); color: #fff; font-weight: bold; font-size: 0.85rem; padding: 4px 8px; border-radius: 4px; display: flex; align-items: center; gap: 6px; white-space: nowrap; }
        .btn-delete-chunk { background: #ff6b6b; border: none; color: white; font-weight: bold; border-radius: 3px; cursor: pointer; padding: 0 5px; font-size: 0.8rem; }
        .history-box { background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 6px; padding: 6px 10px; max-height: 80px; overflow-y: auto; font-size: 0.8rem; color: #94a3b8; list-style: none; text-align: left; margin: 0; }
        
        .slot-card.running { border-color: var(--success); }
        .slot-card.warning { border-color: var(--warning); }
        .slot-card.timeout { border-color: var(--danger); animation: blink-border 0.5s infinite alternate; }

        @keyframes blink-border {
            0% { border-color: var(--danger); }
            100% { border-color: #ff5252; }
        }

        .slider-nav { position: fixed; top: 10px; right: 15px; display: flex; gap: 5px; }
        .nav-dot { width: 8px; height: 8px; background: #3f3f46; border-radius: 50%; transition: background 0.2s; }
        .nav-dot.active { background: #58a6ff; width: 16px; border-radius: 4px; }
    </style>
</head>
<body>

    <h1>📱 Staff Controller</h1>
    
    <div class="slider-nav">
        <div class="nav-dot active" id="dot-1"></div>
        <div class="nav-dot" id="dot-2"></div>
        <div class="nav-dot" id="dot-3"></div>
        <div class="nav-dot" id="dot-4"></div>
        <div class="nav-dot" id="dot-5"></div>
    </div>

    <div class="slider-wrapper" id="main-slider" onscroll="handleSliderScroll()">
        <script>
            const allMembers = [
                { id: 'alice', name: 'Alice' }, { id: 'ame', name: 'Ame' }, { id: 'best', name: 'Best' },
                { id: 'eri', name: 'Eri' }, { id: 'gracenae', name: 'Gracenae' }, { id: 'haru', name: 'Haru' },
                { id: 'jan', name: 'Jan' }, { id: 'jennie', name: 'Jennie' }, { id: 'kartun', name: 'Kartun' },
                { id: 'kitty', name: 'Kitty' }, { id: 'kris', name: 'Kris' }, { id: 'kwang', name: 'Kwang' }, 
                { id: 'lilin', name: 'Lilin' }, { id: 'mickey', name: 'Mickey' }, { id: 'minmin', name: 'Minmin' }, 
                { id: 'nisa', name: 'Nisa' }, { id: 'nori', name: 'Nori' }, { id: 'oum', name: 'Oum' }, 
                { id: 'pear', name: 'Pear' }, { id: 'pin', name: 'Pin' }, { id: 'pixels', name: 'Pixels' }, 
                { id: 'praew', name: 'Praew' }, { id: 'punch', name: 'Punch' }, { id: 'sai', name: 'Sai' }, 
                { id: 'tonliw', name: 'Tonliw' }, { id: 'xiuzhen', name: 'Xiu Zhen' }
            ];
            for (let i = 1; i <= 5; i++) {
                document.write(`
                    <div class="slot-card" id="slot-${i}">
                        <div class="slot-header">
                            <span>SLOT ${i} <span class="slot-indicator">ปัดเปลี่ยนเลน ↔</span></span>
                            <span class="status-text" id="status-${i}">พร้อมทำงาน</span>
                        </div>
                        
                        <select id="member-${i}" onchange="handleMemberChange(${i})">
                            <option value="">-- ว่าง (ปิดสล็อต) --</option>
                            ${allMembers.map(m => `<option value="${m.id}">${m.name}</option>`).join('')}
                        </select>
                        
                        <div class="ticket-stepper">
                            <button class="btn-step" type="button" onclick="adjustTickets(${i}, -1)">−</button>
                            <input type="number" id="tickets-${i}" value="1" min="1" max="100" readonly>
                            <button class="btn-step" type="button" onclick="adjustTickets(${i}, 1)">+</button>
                        </div>

                        <div class="queue-control-grid">
                            <button class="btn-action btn-add-queue" onclick="addTicketToQueue(${i})">+ เพิ่มคิว</button>
                            <button class="btn-action btn-remove-queue" onclick="removeTicketFromQueue(${i})">- ลบออก</button>
                        </div>
                        
                        <div class="tray-title">📥 ถาดตั๋วคิวสะสมในแถว:</div>
                        <div class="queue-tray" id="tray-${i}">
                            <span style="color:#8e9aa8; font-size:0.8rem; padding:6px;">ไม่มีคิวค้าง...</span>
                        </div>

                        <div class="timer-box" id="clock-${i}">00:00</div>
                        
                        <div class="queue-info">
                            ตั๋วรวมในเลน: <strong id="stack-${i}" style="color: #eab308;">0</strong> ใบ | 
                            ⏱️ รอประมาณ: <strong id="wait-${i}" style="color: #fff;">0</strong> นาที
                        </div>
                        
                        <button class="btn-action btn-start" id="btn-time-${i}" onclick="toggleTimer(${i})">START (เริ่มคิว)</button>
                        
                        <div class="tray-title">📜 ประวัติคิวที่ผ่านมา:</div>
                        <ul class="history-box" id="log-${i}">
                            <li>ยังไม่มีประวัติการจับมือในรอบนี้...</li>
                        </ul>

                        <button class="btn-reset" onclick="resetTimer(${i})">RESET ทั้งเลน</button>
                    </div>
                `);
            }
        </script>
    </div>

    <script>
        const socket = io();
        let slotStates = { 1: { currentStatus: 'idle', activeMemberId: '', lastStatus: 'idle' }, 2: { currentStatus: 'idle', activeMemberId: '', lastStatus: 'idle' }, 3: { currentStatus: 'idle', activeMemberId: '', lastStatus: 'idle' }, 4: { currentStatus: 'idle', activeMemberId: '', lastStatus: 'idle' }, 5: { currentStatus: 'idle', activeMemberId: '', lastStatus: 'idle' } };
        
        // หน่วยความจำแคชเก็บข้อมูลทุกเลนจาก Server เพื่อใช้ดึง Setting ปัจจุบันมาโชว์ทันทีเมื่อเลือกชื่อ
        let serverLanesCache = {};

        function playAlertSound() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, ctx.currentTime); 
                gain.gain.setValueAtTime(0.3, ctx.currentTime);
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.start();
                setTimeout(() => { osc.frequency.setValueAtTime(880, ctx.currentTime); }, 150);
                setTimeout(() => { osc.stop(); ctx.close(); }, 300);
            } catch(e) { console.log("Audio play blocked"); }
        }

        function handleSliderScroll() {
            const slider = document.getElementById('main-slider');
            const currentIndex = Math.round(slider.scrollLeft / window.innerWidth) + 1;
            for(let i = 1; i <= 5; i++) {
                document.getElementById(`dot-${i}`).className = (i === currentIndex) ? "nav-dot active" : "nav-dot";
            }
        }

        function adjustTickets(slotNum, amount) {
            const input = document.getElementById(`tickets-${slotNum}`);
            let currentVal = parseInt(input.value) || 1;
            let newVal = currentVal + amount;
            if(newVal < 1) newVal = 1;
            input.value = newVal;
        }

        // 💡 🌟 ไฮไลต์: เมื่อมีการเปลี่ยนเมมเบอร์ ให้ดึงความจำ Setting ปัจจุบันจากระบบมาวาดโชว์ทันที
        function handleMemberChange(slotNum) {
            const targetId = document.getElementById(`member-${slotNum}`).value;
            slotStates[slotNum].activeMemberId = targetId;
            
            if (!targetId || targetId === "") {
                resetSlotUI(slotNum);
                return;
            }

            // ถ้าระบบจำได้ว่าเมมเบอร์คนนี้มีข้อมูลเดินค้างอยู่ในเซิร์ฟเวอร์ ให้ดึงค่านั้นมาอัปเดต UI ทันที
            if (serverLanesCache[targetId]) {
                updateSlotUIWithData(slotNum, serverLanesCache[targetId]);
            } else {
                // ถ้าไม่มีข้อมูลแปลว่าคนนี้ยังคลีนอยู่ ให้ล้างหน้าจอเป็นค่าเริ่มต้น
                resetSlotUI(slotNum);
            }
        }

        // ฟังก์ชันแยกย่อยสำหรับป้อนข้อมูลสดลงช่องควบคุมสล็อต
        function updateSlotUIWithData(slotNum, laneData) {
            const { totalSeconds, status, queueStack, queueArray, historyLog, tickets } = laneData;
            slotStates[slotNum].currentStatus = status;
            slotStates[slotNum].lastStatus = status;

            const min = String(Math.floor(totalSeconds / 60)).padStart(2, '0');
            const sec = String(totalSeconds % 60).padStart(2, '0');
            document.getElementById(`clock-${slotNum}`).textContent = `${min}:${sec}`;
            
            const qStack = queueStack || 0;
            document.getElementById(`stack-${slotNum}`).textContent = qStack;
            document.getElementById(`wait-${slotNum}`).textContent = Math.ceil((qStack * 30) / 60);

            const tray = document.getElementById(`tray-${slotNum}`);
            if(queueArray && queueArray.length > 0) {
                tray.innerHTML = queueArray.map((t, idx) => `
                    <div class="ticket-chunk" style="${idx === 0 && (status === 'running' || status === 'warning') ? 'border-color:var(--success); background:#142216;' : ''}">
                        ${idx === 0 && (status === 'running' || status === 'warning') ? '🟢 คุยอยู่:' : '🎟️'} ${t} ใบ
                        <button class="btn-delete-chunk" onclick="removePiece(${slotNum}, ${idx})">×</button>
                    </div>
                `).join('');
            } else {
                tray.innerHTML = '<span style="color:#8e9aa8; font-size:0.8rem; padding:6px;">ไม่มีคิวค้าง...</span>';
            }

            const logBox = document.getElementById(`log-${slotNum}`);
            if(historyLog && historyLog.length > 0) {
                logBox.innerHTML = historyLog.map(log => `<li>${log}</li>`).join('');
            } else {
                logBox.innerHTML = '<li>ยังไม่มีประวัติการจับมือในรอบนี้...</li>';
            }

            document.getElementById(`slot-${slotNum}`).className = `slot-card ${status}`;
            const btnTime = document.getElementById(`btn-time-${slotNum}`);
            
            if (status === 'running' || status === 'warning') {
                btnTime.textContent = "PAUSE (หยุดคิวชั่วคราว)";
                btnTime.className = "btn-action btn-warning";
                document.getElementById(`status-${slotNum}`).textContent = status === 'warning' ? "ใกล้หมดเวลา" : "กำลังคุย";
            } else if (status === 'timeout') {
                btnTime.textContent = "ปล่อยคิวถัดไป ➔";
                btnTime.className = "btn-action btn-start";
                document.getElementById(`status-${slotNum}`).textContent = "หมดเวลา (เชิญคนต่อไป)";
            } else {
                btnTime.textContent = "START (เริ่มคิว)";
                btnTime.className = "btn-action btn-start";
                document.getElementById(`status-${slotNum}`).textContent = "หยุดเวลาค้างไว้";
            }
        }

        function addTicketToQueue(slotNum) {
            const memberId = slotStates[slotNum].activeMemberId;
            if (!memberId || memberId === "") {
                return alert(`[Slot ${slotNum}] กรุณาเลือกรายชื่อเมมเบอร์ก่อนกดเพิ่มคิวครับ!`);
            }
            const selectEl = document.getElementById(`member-${slotNum}`);
            const memberName = selectEl.options[selectEl.selectedIndex].text;
            const tickets = parseInt(document.getElementById(`tickets-${slotNum}`).value) || 1;
            socket.emit('add_to_stack', { memberId, tickets, name: memberName });
        }

        function removeTicketFromQueue(slotNum) {
            const memberId = slotStates[slotNum].activeMemberId;
            if (!memberId || memberId === "") {
                return alert(`[Slot ${slotNum}] กรุณาเลือกรายชื่อเมมเบอร์ก่อนครับ!`);
            }
            const tickets = parseInt(document.getElementById(`tickets-${slotNum}`).value) || 1;
            socket.emit('remove_from_stack', { memberId, tickets });
        }

        function removePiece(slotNum, index) {
            const memberId = slotStates[slotNum].activeMemberId;
            if(memberId) socket.emit('remove_piece_from_stack', { memberId, index });
        }

        function toggleTimer(slotNum) {
            const memberId = slotStates[slotNum].activeMemberId;
            if(!memberId || memberId === "") return alert('กรุณาเลือกเมมเบอร์ก่อนครับ');
            const currentStatus = slotStates[slotNum].currentStatus;

            if (currentStatus === 'running' || currentStatus === 'warning') {
                socket.emit('pause_queue', { memberId });
            } else {
                const tray = document.getElementById(`tray-${slotNum}`);
                if (tray.textContent.includes("ไม่มีคิวค้าง")) {
                    const selectEl = document.getElementById(`member-${slotNum}`);
                    const memberName = selectEl.options[selectEl.selectedIndex].text;
                    const tickets = parseInt(document.getElementById(`tickets-${slotNum}`).value) || 1;
                    
                    socket.emit('add_to_stack', { memberId, tickets, name: memberName });
                    setTimeout(() => { socket.emit('trigger_manual_start', { memberId: memberId }); }, 150); 
                } else {
                    socket.emit('trigger_manual_start', { memberId: memberId });
                }
            }
        }

        function resetTimer(slotNum) {
            const memberId = slotStates[slotNum].activeMemberId;
            if(memberId && confirm('คุณต้องการล้างคิวทั้งหมดรวมถึงประวัติในเลนนี้ใช่หรือไม่?')) {
                socket.emit('reset_queue', { memberId });
            }
        }

        function resetSlotUI(slotNum) {
            const card = document.getElementById(`slot-${slotNum}`);
            card.className = "slot-card";
            document.getElementById(`clock-${slotNum}`).textContent = "00:00";
            document.getElementById(`status-${slotNum}`).textContent = "พร้อมทำงาน";
            document.getElementById(`stack-${slotNum}`).textContent = "0";
            document.getElementById(`wait-${slotNum}`).textContent = "0";
            document.getElementById(`tickets-${slotNum}`).value = "1";
            document.getElementById(`tray-${slotNum}`).innerHTML = '<span style="color:#8e9aa8; font-size:0.8rem; padding:6px;">ไม่มีคิวค้าง...</span>';
            document.getElementById(`log-${slotNum}`).innerHTML = '<li>ยังไม่มีประวัติการจับมือในรอบนี้...</li>';
            
            const btnTime = document.getElementById(`btn-time-${slotNum}`);
            btnTime.textContent = "START (เริ่มคิว)";
            btnTime.className = "btn-action btn-start";
            slotStates[slotNum].currentStatus = 'idle';
            slotStates[slotNum].lastStatus = 'idle';
        }

        // เมื่อโหลดขึ้นมาครั้งแรก ให้จำแคชข้อมูลทั้งหมดไว้ก่อน
        socket.on('init_all_lanes', (allLanes) => {
            if (allLanes) {
                Object.keys(allLanes).forEach(id => {
                    serverLanesCache[id] = allLanes[id].data ? allLanes[id].data : allLanes[id];
                });
                // รีเฟรชข้อมูลเลนที่สตาฟเปิดดูค้างไว้อยู่ ณ ขณะนั้นด้วย
                for (let i = 1; i <= 5; i++) {
                    const currentId = slotStates[i].activeMemberId;
                    if (currentId && serverLanesCache[currentId]) {
                        updateSlotUIWithData(i, serverLanesCache[currentId]);
                    }
                }
            }
        });

        socket.on('lane_updated', (payload) => {
            // 💡 บันทึกความจำลงแคชส่วนกลางของแอปทุกครั้งที่มีการขยับคิว
            serverLanesCache[payload.memberId] = payload.data;

            for (let i = 1; i <= 5; i++) {
                if (slotStates[i].activeMemberId === payload.memberId) {
                    
                    if (payload.data.status === 'timeout' && slotStates[i].lastStatus !== 'timeout') {
                        playAlertSound();
                        const selectEl = document.getElementById(`member-${i}`);
                        const memberName = selectEl.options[selectEl.selectedIndex].text;
                        alert(`⏰ [หมดเวลาแล้ว!] คิวของ ${memberName} ใน SLOT ${i} สนทนาเสร็จสิ้นแล้ว เชิญคนถัดไปได้เลยครับ`);
                    }

                    // อัปเดตข้อมูลขึ้นหน้าจอ
                    updateSlotUIWithData(i, payload.data);
                }
            }
        });

        socket.on('lane_reseted', (payload) => {
            delete serverLanesCache[payload.memberId];
            for (let i = 1; i <= 5; i++) { if (slotStates[i].activeMemberId === payload.memberId) resetSlotUI(i); }
        });
    </script>
</body>
</html>
