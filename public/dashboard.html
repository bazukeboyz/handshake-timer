<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard - 7 Rows 2 Columns (Auto-Sort)</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --sky-gradient: linear-gradient(135deg, #e0c3fc 0%, #fbc2eb 40%, #fed6e3 70%, #fff1eb 100%);
            --glass-bg: rgba(255, 255, 255, 0.5);
            --glass-border: rgba(255, 255, 255, 0.6);
            --text-main: #2d3748;
            --text-sub: #4a5568;
            
            --success-border: #81c784;
            --success-bg: rgba(232, 245, 233, 0.75);
            --warning-border: #ffd54f;
            --warning-bg: rgba(255, 248, 225, 0.85);
            --danger-border: #e57373;
            --danger-bg: rgba(255, 235, 235, 0.85);
        }

        * { box-sizing: border-box; }

        body { 
            background: var(--sky-gradient);
            background-attachment: fixed;
            color: var(--text-main); 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .header-dash {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.35);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 12px 25px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px 0 rgba(162, 142, 179, 0.15);
        }

        .header-dash h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 800;
            background: linear-gradient(45deg, #6b46c1, #b83280);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border); 
            border-radius: 18px; 
            padding: 12px 18px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 15px; 
            box-shadow: 0 6px 20px 0 rgba(142, 148, 179, 0.1);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease, opacity 0.5s ease;
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px 0 rgba(142, 148, 179, 0.18);
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }

        .member-avatar {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            background: #e2e8f0;
            flex-shrink: 0;
        }

        .name-box { display: flex; flex-direction: column; min-width: 0; }
        .name { font-size: 1.4rem; font-weight: 750; color: #4a154b; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .current-ticket { font-size: 0.8rem; color: var(--text-sub); font-weight: 600; }
        
        .status-section { display: flex; align-items: center; gap: 15px; }
        .time { font-size: 2.8rem; font-family: 'Courier New', Courier, monospace; font-weight: 700; color: #334155; line-height: 1; }

        .stack-badge { 
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(255, 255, 255, 0.7); 
            border-radius: 10px; 
            padding: 6px 10px; 
            font-size: 0.78rem; 
            color: var(--text-sub); 
            text-align: center;
            line-height: 1.3;
            min-width: 100px;
        }
        .stack-badge strong { color: #b83280; font-size: 1rem; }

        .card.running { background: var(--success-bg); border-color: var(--success-border); }
        .card.running .time { color: #2e7d32; }
        .card.running .member-avatar { border-color: var(--success-border); }
        
        .card.warning { background: var(--warning-bg); border-color: var(--warning-border); animation: pulse-glow 1s infinite alternate; }
        .card.warning .time { color: #f57f17; }
        .card.warning .member-avatar { border-color: var(--warning-border); }
        
        .card.timeout { background: var(--danger-bg); border-color: var(--danger-border); animation: flash-bg 0.6s infinite alternate; }
        .card.timeout .time { color: #c62828; }
        .card.timeout .member-avatar { border-color: var(--danger-border); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 4px 15px 0 rgba(255, 213, 79, 0.2); }
            100% { box-shadow: 0 4px 15px 6px rgba(255, 213, 79, 0.35); }
        }
        @keyframes flash-bg {
            0% { border-color: var(--danger-border); }
            100% { border-color: #ff1744; background: rgba(255, 205, 210, 0.85); }
        }
    </style>
</head>
<body>

    <header class="header-dash">
        <h1>THE UPRISING PROJECT - LIVE MONITOR</h1>
        <div style="font-size: 0.95rem; font-weight: 600; color: var(--text-sub);">
            🔥 เรียงตามระยะเวลารอคอย (แสดงสูงสุด 14 เลน)
        </div>
    </header>

    <div class="grid" id="monitor-grid"></div>

    <script>
        const socket = io();
        const grid = document.getElementById('monitor-grid');
        
        let lanesDataStore = {};
        let clearTimeouts = {};

        function renderSortedGrid() {
            let sortedLanes = Object.keys(lanesDataStore).map(id => {
                return { memberId: id, ...lanesDataStore[id] };
            });

            // เรียงลำดับจากคิวสะสมมากสุดไปหาน้อยสุด
            sortedLanes.sort((a, b) => {
                const countA = a.queueStack || 0;
                const countB = b.queueStack || 0;
                if (countB !== countA) return countB - countA;
                
                const secA = a.totalSeconds || 0;
                const secB = b.totalSeconds || 0;
                return secA - secB; // ถ้าคิวเท่ากัน ให้เลนที่เหลือเวลาน้อยสุดอยู่ด้านบน
            });

            // ล็อกสูงสุดไว้ที่ 14 บล็อกเลน
            let top14Lanes = sortedLanes.slice(0, 14);
            grid.innerHTML = '';
            
            top14Lanes.forEach(lane => {
                const totalSec = lane.totalSeconds || 0;
                const min = String(Math.floor(totalSec / 60)).padStart(2, '0');
                const sec = String(totalSec % 60).padStart(2, '0');
                
                const qStack = lane.queueStack || 0;
                const waitMinutes = Math.ceil((qStack * 30) / 60);
                const currentTickets = lane.tickets || 0;
                const statusStr = lane.status || 'idle';

                const card = document.createElement('div');
                card.id = `card-${lane.memberId}`;
                card.className = `card ${statusStr}`;
                
                card.innerHTML = `
                    <div class="profile-section">
                        <img class="member-avatar" src="img/${lane.memberId}.jpg" alt="${lane.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'65\' height=\'65\' viewBox=\'0 0 65 65\'><rect width=\'65\' height=\'65\' fill=\'%23cbd5e1\'/><text x=\'50%\' y=\'55%\' font-family=\'sans-serif\' font-size=\'28\' fill=\'%2364748b\' text-anchor=\'middle\'>👤</text></svg>'">
                        <div class="name-box">
                            <div class="name">${lane.name}</div>
                            <div class="current-ticket">คิวปัจจุบัน: ${currentTickets} ใบ</div>
                        </div>
                    </div>
                    <div class="status-section">
                        <div class="time">${min}:${sec}</div>
                        <div class="stack-badge">
                            คิวรวม: <strong>${qStack}</strong> ใบ<br>
                            รอ: <strong>${waitMinutes}</strong> นาที
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function processLaneUpdate(memberId, name, totalSeconds, status, tickets, queueStack = 0) {
            if (clearTimeouts[memberId]) {
                clearTimeout(clearTimeouts[memberId]);
                delete clearTimeouts[memberId];
            }

            // บันทึก State ลง Store กลาง
            lanesDataStore[memberId] = {
                name: name,
                totalSeconds: totalSeconds || 0,
                status: status || 'idle',
                tickets: tickets || 0,
                queueStack: queueStack || 0
            };

            // หากคิวว่างสนิท ให้เริ่มนับถอยหลัง 10 วินาทีก่อนลบการ์ดออก
            if ((status === 'timeout' || status === 'idle') && (queueStack === 0)) {
                clearTimeouts[memberId] = setTimeout(() => {
                    delete lanesDataStore[memberId];
                    renderSortedGrid();
                    delete clearTimeouts[memberId];
                }, 10000);
            }

            renderSortedGrid();
        }

        socket.on('init_all_lanes', (allLanes) => {
            lanesDataStore = {}; 
            if (allLanes) {
                Object.keys(allLanes).forEach(id => {
                    const lane = allLanes[id];
                    lanesDataStore[id] = {
                        name: lane.name,
                        totalSeconds: lane.totalSeconds || 0,
                        status: lane.status || 'idle',
                        tickets: lane.tickets || 0,
                        queueStack: lane.queueStack || 0
                    };
                });
            }
            renderSortedGrid();
        });
        
        socket.on('lane_updated', (payload) => {
            if (!payload || !payload.memberId || !payload.data) return;
            const name = lanesDataStore[payload.memberId] ? lanesDataStore[payload.memberId].name : payload.memberId.toUpperCase();
            processLaneUpdate(
                payload.memberId, 
                name, 
                payload.data.totalSeconds, 
                payload.data.status, 
                payload.data.tickets, 
                payload.data.queueStack
            );
        });
        
        socket.on('lane_reseted', (payload) => { 
            if (!payload || !payload.memberId) return;
            if (clearTimeouts[payload.memberId]) clearTimeout(clearTimeouts[payload.memberId]);
            delete lanesDataStore[payload.memberId]; 
            renderSortedGrid();
        });
    </script>
</body>
</html>
