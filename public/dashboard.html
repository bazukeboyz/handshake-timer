<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Dashboard - BGG Theme Focus</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            /* 💡 ปรับความทึบแสงของกระจกฝ้าขึ้นเล็กน้อย (0.65) เพื่อให้ตัวหนังสือลอยเด่นเหนือนภาพพื้นหลังรุ้ง */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-border: rgba(255, 255, 255, 0.7);
            --text-main: #2d3748;
            --text-sub: #4a5568;
            
            --success-border: #81c784;
            --success-bg: rgba(232, 245, 233, 0.8);
            --warning-border: #ffd54f;
            --warning-bg: rgba(255, 248, 225, 0.9);
            --danger-border: #e57373;
            --danger-bg: rgba(255, 235, 235, 0.9);
        }

        * { box-sizing: border-box; }

        body { 
            /* 💡 เปลี่ยนมาใช้ภาพพื้นหลัง BGG.jpg ล็อกสเกลเต็มจอแบบไม่ขยับตามการเลื่อน */
            background-image: url('img/BGG.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            
            color: var(--text-main); 
            font-family: system-ui, -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0; 
            min-height: 100vh;
        }

        .header-dash {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            padding: 12px 25px;
            border-radius: 14px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px 0 rgba(162, 142, 179, 0.15);
        }

        .header-dash h1 { 
            margin: 0; 
            font-size: 1.5rem; 
            font-weight: 800;
            background: linear-gradient(45deg, #6b46c1, #b83280);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 1400px;
            margin: 0 auto;
        }

        .card { 
            background: var(--glass-bg); 
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid var(--glass-border); 
            border-radius: 18px; 
            padding: 16px 24px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            gap: 15px; 
            box-shadow: 0 6px 20px 0 rgba(142, 148, 179, 0.12);
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1), box-shadow 0.2s ease, opacity 0.5s ease;
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px 0 rgba(142, 148, 179, 0.2);
        }

        .profile-section {
            display: flex;
            align-items: center;
            gap: 18px;
            flex: 1;
            min-width: 0;
        }

        .member-avatar {
            width: 75px;
            height: 75px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.08);
            background: #e2e8f0;
            flex-shrink: 0;
        }

        .name-box { display: flex; flex-direction: column; min-width: 0; gap: 2px; }
        
        .name { 
            font-size: 2.2rem; 
            font-weight: 900; 
            color: #3b0d3d;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.1;
        }

        .current-ticket { 
            font-size: 1.1rem; 
            color: #4a5568; 
            font-weight: 700; 
        }
        .current-ticket strong {
            color: #6b46c1;
            font-size: 1.3rem;
        }
        
        .status-section { display: flex; align-items: center; }

        .stack-badge { 
            background: rgba(255, 255, 255, 0.75); 
            border: 1px solid rgba(255, 255, 255, 0.9); 
            border-radius: 14px; 
            padding: 8px 18px; 
            font-size: 1.15rem; 
            font-weight: 700;
            color: var(--text-main); 
            text-align: center;
            line-height: 1.4;
            min-width: 160px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
        .stack-badge .wait-highlight {
            color: #b83280;
            font-size: 1.6rem;
            font-weight: 900;
            display: block;
            margin-bottom: 1px;
        }
        .stack-badge .total-queue {
            font-size: 0.85rem;
            color: #64748b;
            font-weight: 600;
        }

        .card.running { background: var(--success-bg); border-color: var(--success-border); }
        .card.running .member-avatar { border-color: var(--success-border); }
        
        .card.warning { background: var(--warning-bg); border-color: var(--warning-border); animation: pulse-glow 1s infinite alternate; }
        .card.warning .member-avatar { border-color: var(--warning-border); }
        
        .card.timeout { background: var(--danger-bg); border-color: var(--danger-border); }
        .card.timeout .member-avatar { border-color: var(--danger-border); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 4px 15px 0 rgba(255, 213, 79, 0.2); }
            100% { box-shadow: 0 4px 15px 6px rgba(255, 213, 79, 0.35); }
        }
    </style>
</head>
<body>

    <header class="header-dash">
        <h1>THE UPRISING PROJECT - LIVE MONITOR</h1>
        <div style="font-size: 0.95rem; font-weight: 600; color: var(--text-sub);">
            ✨ Handshake & Talk 30 Sec.
        </div>
    </header>

    <div class="grid" id="monitor-grid"></div>

    <script>
        const socket = io();
        const grid = document.getElementById('monitor-grid');
        
        let lanesDataStore = {};
        let clearTimeouts = {};

        function renderSortedGrid() {
            let sortedLanes = Object.keys(lanesDataStore).map(id => {
                return { memberId: id, ...lanesDataStore[id] };
            });

            // เรียงลำดับคิวสะสมจากมากไปน้อย
            sortedLanes.sort((a, b) => {
                const countA = a.queueStack || 0;
                const countB = b.queueStack || 0;
                if (countB !== countA) return countB - countA;
                
                const secA = a.totalSeconds || 0;
                const secB = b.totalSeconds || 0;
                return secA - secB;
            });

            let top14Lanes = sortedLanes.slice(0, 14);
            grid.innerHTML = '';
            
            top14Lanes.forEach(lane => {
                const qStack = lane.queueStack || 0;
                const waitMinutes = Math.ceil((qStack * 30) / 60);
                const currentTickets = lane.tickets || 0;
                const statusStr = lane.status || 'idle';

                const card = document.createElement('div');
                card.id = `card-${lane.memberId}`;
                card.className = `card ${statusStr}`;
                
                card.innerHTML = `
                    <div class="profile-section">
                        <img class="member-avatar" src="img/${lane.memberId}.jpg" alt="${lane.name}" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' width=\'75\' height=\'75\' viewBox=\'0 0 75 75\'><rect width=\'75\' height=\'75\' fill=\'%23cbd5e1\'/><text x=\'50%\' y=\'55%\' font-family=\'sans-serif\' font-size=\'32\' fill=\'%2364748b\' text-anchor=\'middle\'>👤</text></svg>'">
                        <div class="name-box">
                            <div class="name">${lane.name}</div>
                            <div class="current-ticket">คิวปัจจุบัน: <strong>${currentTickets}</strong> ใบ</div>
                        </div>
                    </div>
                    <div class="status-section">
                        <div class="stack-badge">
                            <span class="wait-highlight">⏱️ รอ ~ ${waitMinutes} นาที</span>
                            <span class="total-queue">คิวสะสมทั้งหมด: ${qStack} ใบ</span>
                        </div>
                    </div>
                `;
                
                grid.appendChild(card);
            });
        }

        function processLaneUpdate(memberId, name, totalSeconds, status, tickets, queueStack = 0) {
            if (clearTimeouts[memberId]) {
                clearTimeout(clearTimeouts[memberId]);
                delete clearTimeouts[memberId];
            }

            lanesDataStore[memberId] = {
                name: name,
                totalSeconds: totalSeconds || 0,
                status: status || 'idle',
                tickets: tickets || 0,
                queueStack: queueStack || 0
            };

            if ((status === 'timeout' || status === 'idle') && (queueStack === 0)) {
                clearTimeouts[memberId] = setTimeout(() => {
                    delete lanesDataStore[memberId];
                    renderSortedGrid();
                    delete clearTimeouts[memberId];
                }, 10000);
            }

            renderSortedGrid();
        }

        socket.on('init_all_lanes', (allLanes) => {
            lanesDataStore = {}; 
            if (allLanes) {
                Object.keys(allLanes).forEach(id => {
                    const lane = allLanes[id];
                    lanesDataStore[id] = {
                        name: lane.name,
                        totalSeconds: lane.totalSeconds || 0,
                        status: lane.status || 'idle',
                        tickets: lane.tickets || 0,
                        queueStack: lane.queueStack || 0
                    };
                });
            }
            renderSortedGrid();
        });
        
        socket.on('lane_updated', (payload) => {
            if (!payload || !payload.memberId || !payload.data) return;
            const name = lanesDataStore[payload.memberId] ? lanesDataStore[payload.memberId].name : payload.memberId.toUpperCase();
            processLaneUpdate(
                payload.memberId, 
                name, 
                payload.data.totalSeconds, 
                payload.data.status, 
                payload.data.tickets, 
                payload.data.queueStack
            );
        });
        
        socket.on('lane_reseted', (payload) => { 
            if (!payload || !payload.memberId) return;
            if (clearTimeouts[payload.memberId]) clearTimeout(clearTimeouts[payload.memberId]);
            delete lanesDataStore[payload.memberId]; 
            renderSortedGrid();
        });
    </script>
</body>
</html>
